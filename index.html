<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aplikasi Data Peserta Didik</title>

<style>

/* =========================
   GLOBAL
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-size:20px;
}

body{
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:#eef2f7;
    color:#333;
}

/* =========================
   HEADER
========================= */
.header{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    color:white;
    text-align:center;
    padding:20px;
    font-size:20px;
    font-weight:600;
    letter-spacing:1px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

/* =========================
   CONTAINER
========================= */
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* =========================
   CARD
========================= */
.card{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    border:1px solid #e7eaf0;
}

.card h3{
    margin-bottom:15px;
    color:#0d6efd;
}

/* =========================
   STATISTIK
========================= */
.stats{
    text-align:center;
}

.stat-box h2{
    font-size:30px;
    color:#0d6efd;
}

.stat-box p{
    color:#666;
}

/* =========================
   INPUT
========================= */
input{
    width:100%;
    padding:12px;
    border:1px solid #d0d7de;
    border-radius:8px;
    font-size:20px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 0 3px rgba(13,110,253,.2);
}

/* =========================
   FORM GRID
========================= */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* =========================
   BUTTON
========================= */
.button-group{
    margin-top:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

button{
    border:none;
    padding:12px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.btn-primary{
    background:#0d6efd;
    color:white;
}

.btn-success{
    background:#198754;
    color:white;
}

.btn-warning{
    background:#ffc107;
    color:black;
}

.btn-danger{
    background:#dc3545;
    color:white;
}

.btn-dark{
    background:#212529;
    color:white;
}

/* =========================
   TABLE
========================= */
.table-container{
    max-height:400px;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
    position:sticky;
    top:0;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:nth-child(even){
    background:#f8f9fa;
}

tr:hover{
    background:#e9f2ff;
}

/* =========================
   FOOTER
========================= */
.footer{
    text-align:center;
    color:#666;
    padding:20px;
    font-size:13px;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .button-group{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    .header{
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="header">
    🎓 APLIKASI DATA PESERTA DIDIK
</div>

<div class="container">

    <!-- STATISTIK -->
    <div class="card stats">
        <div class="stat-box">
            <h2 id="totalSiswa">0</h2>
            <p>Total Peserta Didik</p>
        </div>
    </div>

    <!-- PENCARIAN -->
    <div class="card">
        <h3>🔍 Pencarian Data</h3>
        <input id="search"
               placeholder="Cari NISN atau Nama..."
               onkeyup="renderTable()">
    </div>

    <!-- FORM -->
    <div class="card">
        <h3>📋 Form Data Peserta Didik</h3>

        <div class="form-grid">

            <input id="nis" placeholder="NIS">

            <input id="nisn" placeholder="NISN">

            <input id="nama" placeholder="Nama Lengkap">

            <input id="jk" placeholder="Jenis Kelamin">

            <input id="tempat" placeholder="Tempat Lahir">

            <input id="tanggal" type="date">

            <input id="alamat"
                   placeholder="Alamat"
                   style="grid-column:1 / -1">

        </div>

        <div class="button-group">

            <button class="btn-success"
                    onclick="tambah()">
                ➕ Tambah
            </button>

            <button class="btn-warning"
                    onclick="editData()">
                ✏️ Edit / Simpan
            </button>

            <button class="btn-danger"
                    onclick="hapus()">
                🗑 Hapus
            </button>

            <button class="btn-dark"
                    onclick="clearForm()">
                🔄 Bersihkan
            </button>

            <button class="btn-primary"
                    onclick="downloadCSV()">
                📥 Download CSV
            </button>

        </div>
    </div>

    <!-- TABEL -->
    <div class="card">

        <h3>📊 Data Peserta Didik</h3>

        <div class="table-container">

            <table id="tabel">

                <thead>
                    <tr>
                        <th>NIS</th>
                        <th>NISN</th>
                        <th>Nama</th>
                        <th>JK</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

</div>

<div class="footer">
    © 2026 Sistem Data Peserta Didik
</div>

<script>

var dataSiswa = [];

/* =========================
   STORAGE
========================= */

function save(){
    localStorage.setItem(
        "dataSiswa",
        JSON.stringify(dataSiswa)
    );
}

function load(){

    var data =
    localStorage.getItem("dataSiswa");

    if(data){
        dataSiswa = JSON.parse(data);
    }else{
        loadCSV();
    }

    renderTable();
}

/* =========================
   LOAD CSV
========================= */

function loadCSV(){

    var xhr = new XMLHttpRequest();

    xhr.open("GET","siswa.csv",true);

    xhr.onload = function(){

        if(xhr.status !== 200) return;

        var lines =
        xhr.responseText.trim().split("\n");

        for(var i=1;i<lines.length;i++){

            var r = lines[i].split(";");

            dataSiswa.push({
                nis:r[0],
                nisn:r[1],
                nama:r[2],
                jk:r[3],
                tempat:r[4],
                tanggal:r[5],
                alamat:r[6]
            });

        }

        save();
        renderTable();

    }

    xhr.send();
}

/* =========================
   TABEL
========================= */

function renderTable(){

    var key =
    search.value.toLowerCase();

    var tbody =
    document.querySelector("#tabel tbody");

    tbody.innerHTML = "";

    dataSiswa.forEach((d,i)=>{

        if(
            d.nama.toLowerCase().includes(key)
            ||
            d.nisn.includes(key)
        ){

            tbody.innerHTML += `
            <tr>
                <td>${d.nis}</td>
                <td>${d.nisn}</td>
                <td>${d.nama}</td>
                <td>${d.jk}</td>
                <td>
                    <button class="btn-primary"
                    onclick="pilih(${i})">
                    Pilih
                    </button>
                </td>
            </tr>`;
        }

    });

    document.getElementById(
        "totalSiswa"
    ).innerText = dataSiswa.length;
}

/* =========================
   PILIH
========================= */

function pilih(i){

    var d = dataSiswa[i];

    nis.value = d.nis;
    nisn.value = d.nisn;
    nama.value = d.nama;
    jk.value = d.jk;
    tempat.value = d.tempat;
    tanggal.value = d.tanggal;
    alamat.value = d.alamat;
}

/* =========================
   TAMBAH
========================= */

function tambah(){

    dataSiswa.push({
        nis:nis.value,
        nisn:nisn.value,
        nama:nama.value,
        jk:jk.value,
        tempat:tempat.value,
        tanggal:tanggal.value,
        alamat:alamat.value
    });

    save();
    renderTable();
    clearForm();
}

/* =========================
   EDIT
========================= */

function editData(){

    var idx =
    dataSiswa.findIndex(
    d=>d.nisn===nisn.value);

    if(idx===-1){

        alert("Data tidak ditemukan");
        return;
    }

    dataSiswa[idx]={

        nis:nis.value,
        nisn:nisn.value,
        nama:nama.value,
        jk:jk.value,
        tempat:tempat.value,
        tanggal:tanggal.value,
        alamat:alamat.value

    };

    save();
    renderTable();
    clearForm();
}

/* =========================
   HAPUS
========================= */

function hapus(){

    if(!confirm("Hapus data ini?")){
        return;
    }

    dataSiswa =
    dataSiswa.filter(
    d=>d.nisn!==nisn.value);

    save();
    renderTable();
    clearForm();
}

/* =========================
   BERSIHKAN
========================= */

function clearForm(){

    document
    .querySelectorAll("input")
    .forEach(i=>i.value="");
}

/* =========================
   DOWNLOAD CSV
========================= */

function downloadCSV(){

    var data =
    JSON.parse(
        localStorage.getItem("dataSiswa")
    ) || [];

    var csv =
    "nis;nisn;nama;jk;tempat_lahir;tanggal_lahir;alamat\n";

    data.forEach(d=>{

        csv +=
        `${d.nis};${d.nisn};${d.nama};${d.jk};${d.tempat};${d.tanggal};${d.alamat}\n`;

    });

    Android.downloadCSV(csv);
}

/* =========================
   INIT
========================= */

window.onload = load;

</script>

</body>
</html>
